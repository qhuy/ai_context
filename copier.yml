# copier.yml — Configuration du template ai_context
# Documentation : https://copier.readthedocs.io/

_subdirectory: template
_templates_suffix: .jinja
_envops:
  keep_trailing_newline: true
_answers_file: .copier-answers.yml

_exclude:
  - "**.pyc"
  - "__pycache__"
  - ".DS_Store"
  # Shims conditionnels selon les agents choisis
  - "{% if 'claude' not in agents %}CLAUDE.md{% endif %}"
  - "{% if 'claude' not in agents %}.claude{% endif %}"
  - "{% if 'cursor' not in agents %}.cursor{% endif %}"
  - "{% if 'gemini' not in agents %}GEMINI.md{% endif %}"
  - "{% if 'copilot' not in agents %}.github/copilot-instructions.md{% endif %}"
  # Règles de scope conditionnelles
  - "{% if 'back' not in scopes %}.ai/rules/back.md{% endif %}"
  - "{% if 'front' not in scopes %}.ai/rules/front.md{% endif %}"
  - "{% if 'architecture' not in scopes %}.ai/rules/architecture.md{% endif %}"
  - "{% if 'security' not in scopes %}.ai/rules/security.md{% endif %}"
  - "{% if 'handoff' not in scopes %}.ai/rules/handoff.md{% endif %}"
  # Dossiers features/<scope>/ conditionnels (scopes métier uniquement)
  - "{% if 'back' not in scopes %}{{ docs_root }}/features/back{% endif %}"
  - "{% if 'front' not in scopes %}{{ docs_root }}/features/front{% endif %}"
  - "{% if 'architecture' not in scopes %}{{ docs_root }}/features/architecture{% endif %}"
  - "{% if 'security' not in scopes %}{{ docs_root }}/features/security{% endif %}"
  # CI opt-in
  - "{% if not enable_ci_guard %}.github/workflows{% endif %}"

_message_after_copy: |
  ✅ AI context scaffoldé.

  Prérequis : jq installé. yq v4 recommandé (parsing YAML propre).
      macOS : brew install jq yq
      Linux : apt install jq + yq depuis https://github.com/mikefarah/yq

  Prochaines étapes :
    1. Lire README_AI_CONTEXT.md à la racine du projet.
    2. Activer les git hooks   : git config core.hooksPath .githooks && chmod +x .githooks/*
    3. Éditer .ai/rules/<scope>.md pour enrichir les règles métier.
    4. Vérifier les shims      : bash .ai/scripts/check-shims.sh
    5. Vérifier les features   : bash .ai/scripts/check-features.sh
    6. (optionnel) couverture  : bash .ai/scripts/check-feature-coverage.sh
    7. (optionnel) coût tokens : bash .ai/scripts/measure-context-size.sh
    8. (optionnel) reprise     : bash .ai/scripts/resume-features.sh
    9. (Claude uniquement) ouvrir /hooks pour activer les hooks.

  Skills Claude disponibles (préfixe /aic-) :
    /aic-feature-new      → créer une feature (fiche + worklog)
    /aic-feature-resume   → reprendre un travail interrompu
    /aic-feature-update   → sauver l'avancement (à chaque pause)
    /aic-feature-handoff  → passation inter-scope ou inter-session
    /aic-quality-gate     → vérification go/no-go avant commit/PR
    /aic-feature-done     → clôture (evidence + status done)

  Env vars utiles :
    AI_CONTEXT_DEBUG=1            → logs debug des hooks
    AI_CONTEXT_SHOW_ALL_STATUS=1  → afficher features done/deprecated/archived dans le reminder
    AI_CONTEXT_FOCUS=<scope>      → réduit l'inventaire au scope + voisins 1-hop (utile sur mesh >100 features)

_message_after_update: |
  ♻️  AI context mis à jour depuis le template.
  Vérifier : bash .ai/scripts/check-shims.sh && bash .ai/scripts/check-features.sh

# ─────────────────── Questions ───────────────────

project_name:
  type: str
  help: Nom du projet (ex my-app)
  validator: "{% if not project_name %}project_name est requis{% endif %}"

project_description:
  type: str
  default: ""
  help: Description courte (1 ligne)

scope_profile:
  type: str
  default: fullstack
  choices:
    minimal (core, quality, workflow): minimal
    backend (+ back, architecture, security, handoff): backend
    fullstack (backend + front): fullstack
    custom (scaffold minimal, tu ajoutes à la main): custom
  help: Profil de scopes à générer

commit_language:
  type: str
  default: fr
  choices: [fr, en]
  help: Langue des messages de commit imposée par les règles

docs_root:
  type: str
  default: .docs
  help: Dossier racine de la doc métier (.docs ou docs)

agents:
  type: str
  multiselect: true
  default:
    - claude
    - codex
  choices: [claude, codex, cursor, gemini, copilot]
  help: Agents dont les shims / hooks seront générés

enable_ci_guard:
  type: bool
  default: true
  help: Workflow GitHub Actions qui lance check-shims + check-features (recommandé)

# ─────────────────── Variables calculées ───────────────────
# scopes : liste dérivée du profil (non affichée à l'utilisateur)

scopes:
  type: json
  when: false
  default: >-
    {%- if scope_profile == 'minimal' -%}
    ["core", "quality", "workflow"]
    {%- elif scope_profile == 'backend' -%}
    ["core", "quality", "workflow", "back", "architecture", "security", "handoff"]
    {%- elif scope_profile == 'fullstack' -%}
    ["core", "quality", "workflow", "back", "front", "architecture", "security", "handoff"]
    {%- else -%}
    ["core", "quality", "workflow"]
    {%- endif -%}
