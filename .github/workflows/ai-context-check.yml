name: ai-context-check

on:
  push:
    paths:
      - '.ai/**'
      - '.docs/features/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'GEMINI.md'
      - '.github/copilot-instructions.md'
  pull_request:
    paths:
      - '.ai/**'
      - '.docs/features/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'GEMINI.md'
      - '.github/copilot-instructions.md'

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # windows-latest = best-effort. Le shell bash de Git for Windows fonctionne
    # mais certains comportements (chemins, dépendances) restent à observer.
    # Une régression Windows ne doit pas bloquer un merge tant que la couverture
    # reste informative.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (jq, yq, shellcheck)
        run: |
          YQ_VERSION=v4.44.3
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            sudo apt-get update -qq
            sudo apt-get install -y jq shellcheck
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            brew update
            brew install jq shellcheck
            arch="$(uname -m)"
            if [[ "$arch" == "arm64" ]]; then
              yq_asset="yq_darwin_arm64"
            else
              yq_asset="yq_darwin_amd64"
            fi
            sudo curl -sSL -o /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/${yq_asset}"
            sudo chmod +x /usr/local/bin/yq
          else
            # Windows : jq + yq préinstallés sur les runners GitHub. shellcheck via choco.
            choco install --no-progress -y shellcheck || true
            jq --version
            yq --version
          fi

      - name: shellcheck
        if: runner.os != 'Windows'
        run: shellcheck -S error .ai/scripts/*.sh

      - name: tests unitaires (path_matches_touch)
        run: bash tests/unit/test-path-matches-touch.sh

      - name: tests unitaires (is_path_within_repo)
        run: bash tests/unit/test-is-path-within-repo.sh

      - name: check-shims
        run: bash .ai/scripts/check-shims.sh

      - name: check-agent-config
        run: bash .ai/scripts/check-agent-config.sh

      - name: check-ai-references
        run: bash .ai/scripts/check-ai-references.sh

      - name: check-features
        run: bash .ai/scripts/check-features.sh

      - name: check-feature-docs
        run: bash .ai/scripts/check-feature-docs.sh

      - name: check-feature-freshness
        run: bash .ai/scripts/check-feature-freshness.sh --warn
