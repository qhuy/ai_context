name: ai-context-check

on:
  push:
    paths:
      - '.ai/**'
      - '.docs/features/**'
      - 'tests/**'
      - '.github/workflows/ai-context-check.yml'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'GEMINI.md'
      - '.github/copilot-instructions.md'
  pull_request:
    paths:
      - '.ai/**'
      - '.docs/features/**'
      - 'tests/**'
      - '.github/workflows/ai-context-check.yml'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'GEMINI.md'
      - '.github/copilot-instructions.md'

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # windows-latest = best-effort. Le shell bash de Git for Windows fonctionne
    # mais certains comportements (chemins, dépendances) restent à observer.
    # Une régression Windows ne doit pas bloquer un merge tant que la couverture
    # reste informative.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install dependencies (jq, yq, shellcheck)
        run: |
          YQ_VERSION=v4.44.3
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            sudo apt-get update -qq
            sudo apt-get install -y jq shellcheck
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64
            # Intégrité supply-chain : sha256 épinglé (checksums officiels yq v4.44.3).
            echo "a2c097180dd884a8d50c956ee16a9cec070f30a7947cf4ebf87d5f36213e9ed7  /usr/local/bin/yq" | sha256sum -c -
            sudo chmod +x /usr/local/bin/yq
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            brew update
            brew install jq shellcheck
            arch="$(uname -m)"
            if [[ "$arch" == "arm64" ]]; then
              yq_asset="yq_darwin_arm64"
              yq_sha="559a594ef7a6ebc5b81a67b7717fb3accedd266d8fa7d8352da7fec9e463f48b"
            else
              yq_asset="yq_darwin_amd64"
              yq_sha="216ddfa03e7ba0e5aba00b236ec78324b5bfc49b610db254fe92310878baea20"
            fi
            sudo curl -sSL -o /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/${yq_asset}"
            # Intégrité supply-chain : sha256 épinglé (checksums officiels yq v4.44.3).
            echo "${yq_sha}  /usr/local/bin/yq" | shasum -a 256 -c -
            sudo chmod +x /usr/local/bin/yq
          else
            # Windows : jq + yq préinstallés sur les runners GitHub. shellcheck via choco.
            choco install --no-progress -y shellcheck || true
            jq --version
            yq --version
          fi

      - name: shellcheck scripts, hooks et tests
        if: runner.os != 'Windows'
        run: |
          files=(.ai/scripts/*.sh)
          if [[ -d .githooks ]]; then
            while IFS= read -r h; do
              [[ -x "$h" ]] && files+=("$h")
            done < <(find .githooks -maxdepth 1 -type f -print)
          fi
          if [[ -d tests ]]; then
            while IFS= read -r t; do
              files+=("$t")
            done < <(find tests -type f -name "*.sh" -print)
          fi
          shellcheck -S error "${files[@]}"

      # Exécute toute la suite tests/unit/*.sh (boucle = pas de liste manuelle à
      # maintenir, tout nouveau test est couvert automatiquement). Les tests qui
      # dépendent de copier (test-dogfood-drift-extra, test-project-overlay,
      # test-targeted-regressions) se court-circuitent proprement quand copier
      # est absent — ce workflow ne l'installe pas (couverture complète : smoke).
      - name: tests unitaires (suite complète)
        run: |
          for t in tests/unit/*.sh; do
            echo "── $(basename "$t")"
            bash "$t"
          done

      - name: check-shims
        run: bash .ai/scripts/check-shims.sh

      - name: check-agent-config
        run: bash .ai/scripts/check-agent-config.sh

      - name: check-ai-references
        run: bash .ai/scripts/check-ai-references.sh

      - name: check-features
        run: bash .ai/scripts/check-features.sh --no-write

      - name: check-feature-docs
        run: bash .ai/scripts/check-feature-docs.sh --strict

      - name: check-feature-coverage
        run: bash .ai/scripts/check-feature-coverage.sh --strict

      - name: check-feature-freshness (historique)
        run: bash .ai/scripts/check-feature-freshness.sh --warn

      - name: check-feature-freshness (diff PR strict)
        if: github.event_name == 'pull_request'
        run: bash .ai/scripts/check-feature-freshness.sh --base="origin/${{ github.base_ref }}" --head=HEAD --strict
